name: release

on:
  push:

env:
  TAG: latest
  IMAGE_NAME: ${{ gitea.repository }}
  REGISTRY: localhost:8088

jobs:
  release:
    name: Release
    runs-on: archlinux
    steps:
      - name: Mirror ghcr -> Gitea registry (skopeo, no docker daemon)
        run: |
          command -v skopeo >/dev/null 2>&1 || apk add --no-cache skopeo
          skopeo copy --dest-tls-verify=false \
            --dest-creds "${{ gitea.actor }}:${{ secrets.REGISTRY_TOKEN }}" \
            docker://ghcr.io/syui/aios:${{ env.TAG }} \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
