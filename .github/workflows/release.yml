name: release

on:
  push:
    branches:
    - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build aios
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/work -w /work \
            archlinux:latest \
            bash -c "pacman -Sy --noconfirm arch-install-scripts zsh && zsh ./build.zsh"

      - name: Push to GitHub Container Registry
        run: |
          cat aios.tar.gz | docker import - ghcr.io/syui/aios
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/syui/aios

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/syui/aios | cut -d@ -f2)
          cosign sign --yes ghcr.io/syui/aios@${DIGEST}

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest
          git push -f origin latest
          gh release create latest aios.tar.gz --title "latest" --notes "build $(date +%Y.%m.%d)" --target main
